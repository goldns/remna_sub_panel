server {
    listen 80;
    server_name example.com;

    root /var/www/sub;
    index index.php;

    # Disable directory listing
    autoindex off;

    # Block all dot-files and dot-directories (.git, .env, .htaccess, etc.)
    location ~ /\. {
        deny all;
    }

    # Block direct access to config and internal PHP files
    location ~* ^/(config\.php|conf\.php|template\.php|functions\.php|happ\.php|browser\.php) {
        deny all;
    }

    # Block direct access to /templates/ and /cache/ directories
    location ~* ^/(templates|cache)(/|$) {
        deny all;
    }

    # Block sensitive file types
    location ~* \.(cache|conf|example|txt|json|md)$ {
        deny all;
    }

    # Route /{shortUuid} → index.php?id={shortUuid}
    location ~* ^/([A-Za-z0-9_\-]+)/?$ {
        try_files $uri $uri/ /index.php?id=$1&$args;
    }

    # PHP-FPM — no browser caching for dynamic responses
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Static assets — no browser caching
    location /assets/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # Fallback: serve file or 404
    location / {
        try_files $uri $uri/ =404;
    }
}
